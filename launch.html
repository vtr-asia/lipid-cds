<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣血脂 CDS - 啟動中...</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    :root {
      --primary: #0066cc;
      --bg-dark: #0a192f;
      --text-light: #e6f1ff;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader-container { padding: 20px; }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="loader"></div>
    <h2>正在連線至 FHIR 醫療資訊系統...</h2>
    <p>請稍候，我們正在準備您的臨床決策輔助工具</p>
  </div>

  <script>
    /**
     * SMART on FHIR 啟動邏輯
     * 此頁面將接收來自 EHR (如衛福部沙盒) 的啟動參數 (iss, launch)
     * 並重新導向至認證伺服器
     */
    FHIR.oauth2.authorize({
      // 1. Client ID: 請確認此 ID 已在 THAS 管理後台註冊
      clientId: 'taiwan-lipid-cds-2025',

      // 2. Scopes: 必須包含 launch 與存取資源的權限
      // launch: 連結當前 EHR 上下文
      // patient/*.read: 讀取目前病人的基本資料與檢驗值
      scope: 'launch openid fhirUser patient/Patient.read patient/Observation.read patient/Condition.read',

      // 3. Redirect URI: 認證完成後跳轉回您的主程式頁面
      // 建議使用相對路徑，確保在 GitHub Pages 環境下路徑正確
      redirectUri: 'index.html',

      // 注意：iss 與 launch 參數會自動由 fhir-client 從 URL Query String 中抓取，
      // 除非是測試需求，否則不建議在此寫死 iss。
    });
  </script>
</body>
</html>
