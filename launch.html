<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>SMART Launch - Lipid CDS</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
</head>
<body>
    <p>正在連線至 THAS FHIR Server 並進行身分驗證，請稍候...</p>
    <script>
        FHIR.oauth2.authorize({
            // client_id 需與您在 THAS 註冊的 ID 一致，若為測試環境通常可填 "my_web_app"
            "client_id": "my_web_app", 
            "scope": "patient/*.read launch openid fhirUser",
            // 授權成功後，跳轉回 index.html
            "redirect_uri": "index.html" 
        });
    </script>
</body>
</html>
