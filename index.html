<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🩺 2025 台灣血脂 CDS 決策支援系統</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --veryhigh: #c0392b; --high: #d35400; --low: #2980b9;
    }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f8; padding: 20px; color: #2c3e50; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    /* 測試面板 */
    .test-panel { background: #e8f1f8; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #cfe2f3; }
    select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #3498db; }

    /* 決策建議區塊 */
    .decision-box { padding: 30px; border-radius: 16px; margin: 20px 0; color: white; transition: 0.3s; }
    .decision-box.veryhigh { background: linear-gradient(135deg, #c0392b, #e74c3c); border-left: 10px solid #8e1b0f; }
    .decision-box.high { background: linear-gradient(135deg, #d35400, #f39c12); border-left: 10px solid #a04000; }
    .decision-box.low { background: linear-gradient(135deg, #2980b9, #3498db); border-left: 10px solid #1a5276; }

    .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; background: rgba(255,255,255,0.25); font-size: 0.9rem; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
    .card { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; }

    pre { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 10px; font-size: 12px; overflow-x: auto; max-height: 250px; }
    .loading { text-align: center; padding: 50px; font-size: 1.2rem; }
    .source-tag { font-size: 0.8rem; float: right; opacity: 0.7; }
  </style>
</head>
<body>

<div class="container">
  <div id="loader" class="loading">🔄 正在連接 FHIR 伺服器...</div>

    <h1 style="margin:0; color: #2c3e50;">🩺 台灣血脂 CDS <small style="font-size: 14px; color: #7f8c8d;">2025 專家共識版</small></h1>

    <pre id="obsRaw"></pre>
  </div>
</div>
