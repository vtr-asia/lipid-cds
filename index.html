<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; line-height: 1.6; background-color: #f0f2f5; }
    .header { text-align: center; margin-bottom: 30px; }
    .patient-info { margin-bottom: 20px; padding: 15px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .risk-select { margin-bottom: 20px; padding: 20px; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    label { font-weight: 600; color: #2c3e50; display: block; margin-bottom: 10px; }
    select { padding: 12px; font-size: 16px; border: 2px solid #3498db; border-radius: 8px; width: 100%; max-width: 500px; }
    
    .decision { color: white; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    .status-good { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); }
    .status-warning { background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%); }
    .status-danger { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); }
    .status-unknown { background: linear-gradient(135deg, #7f8c8d 0%, #95a5a6 100%); }

    .debug-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    pre { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 8px; font-size: 12px; overflow: auto; max-height: 300px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🩺 台灣血脂 CDS 決策支援系統</h1>
    <p>依據 2025 台灣血脂管理專家共識建議（SMART on FHIR 版）</p>
  </div>

  <div class="patient-info" id="patientInfo">
    <strong>病人資訊載入中...</strong>
  </div>

  <div class="risk-select">
    <label for="riskSelect">🔍 風險分層選擇（測試用）</label>
    <select id="riskSelect">
      <option value="low">一般風險（目標 < 130）</option>
      <option value="high" selected>高風險／糖尿病（目標 < 100）</option>
      <option value="veryhigh">非常高風險／MI 或洗腎（目標 < 70）</option>
    </select>
  </div>

  <div id="decisionResult"></div>

  <div id="debugInfo" class="debug-panel">
    <div><h3>📄 Patient 資源 (JSON)</h3><pre id="patient">載入中...</pre></div>
    <div><h3>🧪 Observation 資源 (JSON)</h3><pre id="obs">載入中...</pre></div>
  </div>

  <script>
    const LOINC_LDL = "13457-7";

    // 風險設定（測試用）
    const RISK_CONFIG = {
      low: { level: "low", target: 130, desc: "無重大心血管疾病、無糖尿病、無慢性腎病" },
      high: { level: "high", target: 100, desc: "糖尿病病史 (DM)" },
      veryhigh: { level: "veryhigh", target: 70, desc: "曾患急性心肌梗塞 或 慢性腎病第五期" }
    };

    function evaluateStatinRecommendation(ldl, riskKey) {
      const risk = RISK_CONFIG[riskKey] || RISK_CONFIG.high;
      if (ldl === null) {
        return `<div class="decision status-unknown">❓ 找不到 LDL-C 紀錄（LOINC: ${LOINC_LDL}）<br>建議立即安排血脂檢驗</div>`;
      }
      const isAchieved = ldl < risk.target;
      const isSeverelyHigh = ldl >= risk.target * 1.2;

      let statusClass = "status-good", title = "✅ 良好控制";
      let advice = "目前治療效果理想，請維持良好生活習慣與現有藥物。";

      if (!isAchieved) {
        statusClass = isSeverelyHigh ? "status-danger" : "status-warning";
        title = isSeverelyHigh ? "🚨 立即加強治療" : "⚠️ 尚未達標";
        advice = isSeverelyHigh 
          ? "建議在最大耐受劑量 Statin 之外，考慮合併 Ezetimibe 或 PCSK9 抑制劑。"
          : "建議評估藥物順從性，並考慮調升 Statin 劑量或更換強效型 Statin。";
      }

      return `
        <div class="decision ${statusClass}">
          <div style="font-size: 24px; font-weight: bold;">${title}</div>
          <div style="font-size: 18px;">目前 LDL-C: ${ldl} mg/dL | 目標: &lt; ${risk.target} mg/dL</div>
          <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 15px 0;">
          <div style="text-align: left;">
            <strong>個案背景：</strong> ${risk.desc}<br><br>
            <strong>專家建議：</strong> ${advice}
          </div>
        </div>`;
    }

    function extractLdlValue(bundle) {
      if (!bundle?.entry?.length) return null;
      return bundle.entry[0].resource.valueQuantity?.value ?? null;
    }

    // ==================== SMART on FHIR 主程式 ====================
    async function loadSMARTData() {
      const patientEl = document.getElementById("patient");
      const obsEl = document.getElementById("obs");
      const decisionEl = document.getElementById("decisionResult");
      const patientInfoEl = document.getElementById("patientInfo");

      try {
        const client = await FHIR.oauth2.ready();

        // 取得目前病人
        const patient = await client.patient.read();
        const patientId = client.patient.id;
        patientInfoEl.innerHTML = `<strong>病人：</strong> ${patient.name?.[0]?.text || patient.name?.[0]?.given?.join(' ') || '未知'}（ID: ${patientId}）`;

        // 顯示 JSON（除錯用）
        patientEl.textContent = JSON.stringify(patient, null, 2);

        // 抓取最新 LDL-C
        const obsBundle = await client.request(`Observation?patient=${patientId}&code=${LOINC_LDL}&_sort=-date&_count=1`);
        obsEl.textContent = JSON.stringify(obsBundle, null, 2);

        const ldl = extractLdlValue(obsBundle);

        // 初始顯示（預設高風險）
        const riskKey = document.getElementById("riskSelect").value;
        decisionEl.innerHTML = evaluateStatinRecommendation(ldl, riskKey);

        // 風險選擇變更時重新計算
        document.getElementById("riskSelect").addEventListener("change", (e) => {
          decisionEl.innerHTML = evaluateStatinRecommendation(ldl, e.target.value);
        });

      } catch (e) {
        console.error(e);
        decisionEl.innerHTML = `<div class="decision status-danger">❌ 無法取得授權或連線失敗<br>${e.message}</div>`;
      }
    }

    // 啟動
    document.addEventListener("DOMContentLoaded", loadSMARTData);
  </script>
</body>
</html>
