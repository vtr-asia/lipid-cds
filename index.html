<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🩺 台灣血脂 CDS - 臨床決策輔助系統</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 20px; 
      max-width: 1000px; 
      margin: 0 auto; 
      line-height: 1.6; 
      background-color: #f8f9fa; 
    }
    .card { 
      background: white; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
      margin-bottom: 20px; 
    }
    h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
    h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; }
    pre { 
      background: #2d3436; 
      color: #dfe6e9; 
      padding: 15px; 
      border-radius: 8px; 
      overflow-x: auto; 
      font-size: 13px; 
    }
    .decision-box { 
      padding: 20px; 
      border-radius: 10px; 
      color: white; 
      font-weight: bold; 
      font-size: 1.2rem; 
      text-align: center; 
    }
    .status-success { background-color: var(--success); }
    .status-warning { background-color: var(--warning); }
    .status-danger { background-color: var(--danger); }
    .loading-overlay { text-align: center; padding: 50px; }
  </style>
</head>
<body>

  <h1>🩺 台灣血脂 CDS 決策輔助</h1>

  <div id="loading" class="loading-overlay">
    <h2>正在從 FHIR 伺服器讀取病歷資料...</h2>
  </div>

  <div id="app-content" style="display:none;">
    <div class="card">
      <h2>👤 病人基本資訊 (Patient Resource)</h2>
      <div id="patient-info">載入中...</div>
      <pre id="patient-raw"></pre>
    </div>

    <div class="card">
      <h2>🧪 最新血脂檢驗 (LDL-C Observation)</h2>
      <div id="obs-info">載入中...</div>
      <pre id="obs-raw"></pre>
    </div>

    <div class="card">
      <h2>💡 臨床路徑建議 (CDS Output)</h2>
      <div id="decisionResult"></div>
    </div>
  </div>

  <script>
    // 定義 LOINC Code (LDL-C)
    const LOINC_LDL = "13457-7"; 

    // 1. 初始化 SMART Client
    FHIR.oauth2.ready().then(async (client) => {
      console.log("SMART Client 已就緒:", client);
      
      document.getElementById("loading").style.display = "none";
      document.getElementById("app-content").style.display = "block";

      try {
        // 2. 取得當前上下文的病人 ID
        const patientId = client.patient.id;

        // 3. 並行執行 API 請求
        const [patientData, ldlData] = await Promise.all([
          client.request(`Patient/${patientId}`),
          client.request(`Observation?patient=${patientId}&code=${LOINC_LDL}&_sort=-date&_count=1`)
        ]);

        // 4. 顯示病人資料
        const name = patientData.name ? patientData.name[0].text || patientData.name[0].family : "未知";
        const gender = patientData.gender === 'male' ? '男' : '女';
        document.getElementById("patient-info").innerHTML = `<strong>姓名：</strong>${name} | <strong>性別：</strong>${gender} | <strong>ID：</strong>${patientId}`;
        document.getElementById("patient-raw").textContent = JSON.stringify(patientData, null, 2);

        // 5. 處理 LDL 數值
        let ldlValue = null;
        if (ldlData.entry && ldlData.entry.length > 0) {
          const obs = ldlData.entry[0].resource;
          ldlValue = obs.valueQuantity.value;
          const unit = obs.valueQuantity.unit;
          const date = new Date(obs.effectiveDateTime).toLocaleDateString();
          document.getElementById("obs-info").innerHTML = `<strong>最新 LDL-C：</strong> <span style="font-size:1.5rem; color:#e74c3c;">${ldlValue}</span> ${unit} (日期：${date})`;
          document.getElementById("obs-raw").textContent = JSON.stringify(obs, null, 2);
        } else {
          document.getElementById("obs-info").textContent = "查無 LDL-C 檢驗紀錄";
        }

        // 6. 執行 CDS 邏輯判斷
        displayDecision(ldlValue);

      } catch (err) {
        console.error("資料讀取失敗:", err);
        document.getElementById("decisionResult").innerHTML = `<div class="decision-box status-danger">❌ 資料讀取錯誤，請檢查伺服器連線</div>`;
      }
    }).catch(console.error);

    // 臨床決策邏輯 (範例)
    function displayDecision(ldl) {
      const target = 100; // 假設目標值為 100 mg/dL
      const resultEl = document.getElementById("decisionResult");
      
      if (ldl === null) {
        resultEl.innerHTML = `<div class="decision-box status-warning">⚠ 缺漏數據：請補做 LDL-C 檢驗</div>`;
      } else if (ldl > target) {
        resultEl.innerHTML = `<div class="decision-box status-danger">🚨 未達標：LDL-C (${ldl}) > ${target}。建議考慮調整 Statin 藥物劑量。</div>`;
      } else {
        resultEl.innerHTML = `<div class="decision-box status-success">✅ 已達標：目前治療方案穩定。</div>`;
      }
    }
  </script>
</body>
</html>
