<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.6.3/build/fhir-client.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.5; }

    /* Header */
    header {
      background: #0f172a; color: white; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand h1 { font-size: 1.25rem; font-weight: 700; }
    .auth-status { font-size: 0.85rem; display: flex; align-items: center; gap: 6px; opacity: 0.9; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #fb7185; }
    .status-dot.online { background: #4ade80; box-shadow: 0 0 8px #4ade80; }

    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }

    /* Patient & Risk Section */
    .dashboard-header {
      display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;
    }
    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; }

    .patient-brief { display: flex; align-items: center; gap: 1rem; }
    .avatar { width: 48px; height: 48px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .patient-info h2 { font-size: 1.1rem; margin-bottom: 2px; }
    .patient-info p { font-size: 0.85rem; color: var(--text-sub); }

    .risk-config label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); display: block; margin-bottom: 0.5rem; }
    select { 
      width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); 
      background: #f1f5f9; font-size: 0.9rem; cursor: pointer;
    }

    /* Result Panel */
    .result-panel {
      padding: 2.5rem; border-radius: var(--radius); color: white;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .result-panel.good { background: linear-gradient(135deg, #059669, #10b981); }
    .result-panel.warn { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .result-panel.danger { background: linear-gradient(135deg, #dc2626, #ef4444); }
    .result-panel.unknown { background: #475569; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center; }
    .main-value .label { font-size: 0.9rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
    .main-value .val { font-size: 4rem; font-weight: 800; line-height: 1; margin: 0.5rem 0; }
    .main-value .target { font-size: 1.1rem; opacity: 0.9; }

    .recommendation { background: rgba(255, 255, 255, 0.15); padding: 1.5rem; border-radius: 10px; backdrop-filter: blur(4px); }
    .recommendation h3 { font-size: 1.1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .recommendation p { font-size: 0.95rem; line-height: 1.6; }

    /* Debug Section */
    .debug-area { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 1rem; }
    .debug-btn { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
    pre { background: #1e293b; color: #94a3b8; padding: 1rem; border-radius: 8px; font-size: 0.75rem; margin-top: 1rem; display: none; overflow-x: auto; }

    @media (max-width: 768px) {
      .dashboard-header, .result-grid { grid-template-columns: 1fr; }
      .main-value .val { font-size: 3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <span>🩺</span>
    <h1>血脂管理決策支援 (CDS)</h1>
  </div>
  <div class="auth-status" id="authStatus">
    <span class="status-dot"></span> 正在連線 FHIR...
  </div>
</header>

<div class="container">
  
  <div class="dashboard-header">
    <div class="card patient-brief">
      <div class="avatar" id="pAvatar">👤</div>
      <div class="patient-info">
        <h2 id="pName">載入中...</h2>
        <p id="pMeta">正在獲取病人臨床數據...</p>
      </div>
    </div>

    <div class="card risk-config">
      <label>臨床風險分層 (醫師評估)</label>
      <select id="riskSelect">
        <option value="low">一般風險 (LDL 目標 < 130)</option>
        <option value="high">高風險：糖尿病 (LDL 目標 < 100)</option>
        <option value="veryhigh_mi">極高風險：心肌梗塞 (LDL 目標 < 70)</option>
        <option value="veryhigh_ckd">極高風險：洗腎/CKD5 (LDL 目標 < 70)</option>
      </select>
    </div>
  </div>

  <div id="decisionContainer">
    <div class="result-panel unknown">
      <div style="text-align: center; padding: 2rem;">
        <p>正在同步 FHIR Server 臨床數值...</p>
      </div>
    </div>
  </div>

  <div class="debug-area">
    <button class="debug-btn" onclick="document.querySelector('pre').style.display='block'">顯示 FHIR 原始資料</button>
    <pre id="debugOutput">等待數據...</pre>
  </div>

</div>

<script>
  const RISK_MAP = {
    low: { label: "一般風險", target: 130, icon: "✅" },
    high: { label: "糖尿病高風險", target: 100, icon: "⚠️" },
    veryhigh_mi: { label: "心肌梗塞史", target: 70, icon: "🚨" },
    veryhigh_ckd: { label: "洗腎/末期腎病", target: 70, icon: "🚨" }
  };

  const LOINC_LDL = "13457-7";
  let _currentLdl = null;

  // 渲染整合後的結果介面
  function renderDecision(ldl, riskKey) {
    const config = RISK_MAP[riskKey];
    const container = document.getElementById("decisionContainer");
    
    if (ldl === null) {
      container.innerHTML = `
        <div class="result-panel unknown">
          <div class="result-grid">
            <div class="main-value"><div class="label">目前 LDL-C</div><div class="val">N/A</div><div class="target">無檢驗紀錄</div></div>
            <div class="recommendation"><h3>查無數據</h3><p>請安排 LDL-C 抽血檢查。當前風險設定：${config.label}。</p></div>
          </div>
        </div>`;
      return;
    }

    const gap = ldl - config.target;
    const isGood = ldl < config.target;
    const isDanger = ldl >= config.target * 1.2;
    const statusClass = isGood ? 'good' : (isDanger ? 'danger' : 'warn');
    const statusTitle = isGood ? '達標：建議維持' : (isDanger ? '嚴重超標：建議加強藥物' : '未達標：建議調整');

    let advice = isGood ? 
      "數值理想，請維持目前的生活型態與藥物治療，並定期追蹤。" : 
      `超出目標值 ${gap.toFixed(0)} mg/dL。建議評估藥物順從性，${isDanger ? '考慮合併使用 Ezetimibe 或 PCSK9 抑制劑。' : '考慮換用強效 Statin (如 Rosuvastatin)。'}`;

    container.innerHTML = `
      <div class="result-panel ${statusClass}">
        <div class="result-grid">
          <div class="main-value">
            <div class="label">目前 LDL-C (mg/dL)</div>
            <div class="val">${ldl}</div>
            <div class="target">目標值：&lt; ${config.target} | 差距：${gap > 0 ? '+' : ''}${gap.toFixed(0)}</div>
          </div>
          <div class="recommendation">
            <h3>${config.icon} ${statusTitle}</h3>
            <p>針對 <strong>${config.label}</strong> 患者：<br>${advice}</p>
          </div>
        </div>
      </div>`;
  }

  // FHIR 啟動邏輯
  FHIR.oauth2.ready().then(client => {
    document.getElementById("authStatus").innerHTML = '<span class="status-dot online"></span> 服務已連線';
    
    // 1. 獲取病人基本資料
    client.patient.read().then(p => {
      document.getElementById("pName").textContent = client.getPath(p, "name.0.text") || "匿名病人";
      document.getElementById("pMeta").textContent = `${p.gender === 'male' ? '男' : '女'} | ${p.birthDate} | FHIR ID: ${p.id}`;
      document.getElementById("pAvatar").textContent = p.gender === 'male' ? '👨' : '👩';
      document.getElementById("debugOutput").textContent = JSON.stringify(p, null, 2);
    });

    // 2. 獲取 LDL 數值
    client.request(`Observation?patient=${client.patient.id}&code=${LOINC_LDL}&_sort=-date&_count=1`)
