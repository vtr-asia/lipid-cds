<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🩺 台灣血脂 CDS - 2025 臨床路徑</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    :root {
      --primary-color: #3498db;
      --success-color: #27ae60;
      --warning-color: #f39c12;
      --danger-color: #c0392b;
      --unknown-color: #7f8c8d;
    }
    body { font-family: -apple-system, "Segoe UI", sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; line-height: 1.6; background-color: #f4f7f9; color: #2c3e50; }
    .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    
    /* 個案選單區塊 */
    .patient-select-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
    label { font-weight: bold; display: block; margin-bottom: 10px; color: #34495e; }
    select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid var(--primary-color); border-radius: 8px; outline: none; transition: border-color 0.3s; }

    /* 決策支援卡片 */
    .decision-card { color: white; padding: 30px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .status-good { background: linear-gradient(135deg, #27ae60, #2ecc71); }
    .status-warning { background: linear-gradient(135deg, #f39c12, #f1c40f); }
    .status-danger { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .status-unknown { background: linear-gradient(135deg, #7f8c8d, #95a5a6); }
    
    .decision-card h2 { margin: 0 0 10px 0; font-size: 28px; }
    .decision-card hr { border: 0; border-top: 1px solid rgba(255,255,255,0.3); margin: 20px 0; }
    .advice-text { font-size: 18px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 8px; }

    /* 除錯面板 */
    .debug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .debug-box { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 8px; font-size: 13px; }
    pre { overflow: auto; max-height: 300px; white-space: pre-wrap; word-wrap: break-word; }
    h3 { margin-top: 0; color: #ecf0f1; border-bottom: 1px solid #444; padding-bottom: 8px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🩺 台灣血脂管理 CDS</h1>
    <p>依據 2025 台灣血脂管理專家共識建議</p>
  </div>

  <div class="patient-select-box">
    <label for="patientSelect">🔍 當前臨床個案：</label>
    <select id="patientSelect">
      <option value="case-001">Case 1: 陳建國 (一般風險 - 目標 130)</option>
      <option value="case-002">Case 2: 林淑芬 (高風險/糖尿病 - 目標 100)</option>
      <option value="case-003">Case 3: 李大衛 (非常高風險/MI - 目標 70)</option>
      <option value="case-004">Case 4: 張阿中 (極高風險/洗腎 - 目標 70)</option>
      <option value="case-005">Case 5: 查無此人 (數據缺失測試)</option>
    </select>
  </div>

  <div id="decisionArea">
    </div>

  <div class="debug-grid">
    <div class="debug-box">
      <h3>📄 Patient FHIR JSON</h3>
      <pre id="patientJson">等待數據...</pre>
    </div>
    <div class="debug-box">
      <h3>🧪 Observation FHIR JSON</h3>
      <pre id="obsJson">等待數據...</pre>
    </div>
  </div>

  <script>
    // 1. 定義 5 個測試病人的風險與目標
    const CLINICAL_CONFIG = {
      "case-001": { name: "陳建國", risk: "一般風險", target: 130, desc: "無重大心血管疾病、無糖尿病" },
      "case-002": { name: "林淑芬", risk: "高風險", target: 100, desc: "糖尿病病史 (DM)" },
      "case-003": { name: "李大衛", risk: "非常高風險", target: 70, desc: "急性心肌梗塞病史 (MI)" },
      "case-004": { name: "張阿中", risk: "極高風險", target: 70, desc: "慢性腎病第五期 (洗腎患者)" },
      "case-005": { name: "查無此人", risk: "未定義", target: null, desc: "新病人，無檢驗紀錄測試" }
    };

    const LOINC_LDL = "13457-7";
    const FHIR_BASE = "https://thas.mohw.gov.tw/v/r4/fhir";

    // 2. 決策支援邏輯
    function generateDecisionCard(ldl, patientId) {
      const config = CLINICAL_CONFIG[patientId] || { name: "未知病人", risk: "未知", target: 130, desc: "查無此 ID 資訊" };
      
      // 處理無數據情況 (Case 5)
      if (ldl === null || ldl === undefined) {
        return `
          <div class="decision-card status-unknown">
            <h2>❓ 資訊不足</h2>
            <p>目前病人：${config.name} (${config.risk})</p>
            <hr>
            <div class="advice-text">
              <strong>臨床建議：</strong> 伺服器查無此病人之 LDL-C 紀錄。請先安排血脂檢驗，或確認資料是否已正確上傳至 THAS 平台。
            </div>
          </div>`;
      }

      const target = config.target;
      const isAchieved = ldl < target;
      const isSeverelyHigh = ldl >= target * 1.2; // 嚴重超標判定

      let cardClass = isAchieved ? "status-good" : (isSeverelyHigh ? "status-danger" : "status-warning");
      let title = isAchieved ? "✅ 良好控制" : (isSeverelyHigh ? "🚨 立即加強治療" : "⚠️ 尚未達標");
      let drugAdvice = isAchieved ? "建議維持現有藥物與生活習慣。" : 
                       (isSeverelyHigh ? "數值顯著高於目標。依據 2025 共識，除 Statin 外，應考慮合併 <strong>Ezetimibe</strong> 或 <strong>PCSK9i</strong>。" : 
                        "尚未達標。建議評估順從性，並考慮調升 Statin 劑量。");

      return `
        <div class="decision-card ${cardClass}">
          <h2>${title}</h2>
          <p style="font-size: 20px;">當前 LDL-C: <strong>${ldl}</strong> mg/dL | 目標: < <strong>${target}</strong> mg/dL</p>
          <hr>
          <div class="advice-text">
            <strong>風險分層：</strong> ${config.desc}<br><br>
            <strong>處置建議：</strong> ${drugAdvice}
          </div>
        </div>`;
    }

    // 3. 獲取數據的主函數
    async function updateUI(client, patientId) {
      const pJsonEl = document.getElementById("patientJson");
      const oJsonEl = document.getElementById("obsJson");
      const decisionArea = document.getElementById("decisionArea");

      try {
        // 抓取 Patient
        const patient = await client.request(`Patient/${patientId}`);
        pJsonEl.textContent = JSON.stringify(patient, null, 2);

        // 抓取最新 Observation (LDL)
        const obsBundle = await client.request(`Observation?patient=${patientId}&code=${LOINC_LDL}&_sort=-date&_count=1`);
        oJsonEl.textContent = JSON.stringify(obsBundle, null, 2);

        // 解析 LDL 值
        let ldlValue = null;
        if (obsBundle.entry && obsBundle.entry.length > 0) {
          ldlValue = obsBundle.entry[0].resource.valueQuantity.value;
        }

        // 顯示決策卡片
        decisionArea.innerHTML = generateDecisionCard(ldlValue, patientId);

      } catch (err) {
        console.error(err);
        decisionArea.innerHTML = `<div class="decision-card status-danger">❌ 無法從伺服器取得資料</div>`;
      }
    }

    // 4. SMART on FHIR 啟動或手動切換
    FHIR.oauth2.ready().then(client => {
      // 若從 SMART Launch 進入
      const pId = client.patient.id;
      document.getElementById("patientSelect").value = pId;
      updateUI(client, pId);
    }).catch(err => {
      // 若非 SMART 啟動，使用手動模擬模式
      console.log("切換為手動模擬模式");
      const select = document.getElementById("patientSelect");
      const manualClient = {
        request: (query) => fetch(`${FHIR_BASE}/${query}`).then(r => r.json())
      };

      const handleManual = () => updateUI(manualClient, select.value);
      select.addEventListener("change", handleManual);
      handleManual(); // 初始載入第一個選單值
    });
  </script>
</body>
</html>
